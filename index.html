<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인스타 썸네일 메이커</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --ink:#111111;
    --panel:#FFFFFF;
    --panel-2:#F3F3F3;
    --stone:#FFFFFF;
    --accent:#111111;
    --line:#DEDEDE;
    --text-soft:#767676;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background:var(--stone);
    color:var(--ink);
    min-height:100vh;
  }
  .app{
    display:flex;
    min-height:100vh;
  }
  /* SIDEBAR */
  .sidebar{
    width:340px;
    flex-shrink:0;
    background:var(--panel);
    color:var(--ink);
    padding:28px 24px 40px;
    overflow-y:auto;
    border-right:1px solid var(--line);
  }
  .brand{
    font-size:13px;
    letter-spacing:0.14em;
    color:var(--accent);
    text-transform:uppercase;
    margin-bottom:4px;
    font-weight:700;
  }
  .brand-title{
    font-size:21px;
    font-weight:800;
    margin:0 0 28px;
    letter-spacing:-0.01em;
    color:var(--ink);
  }
  .section{
    margin-bottom:26px;
  }
  .section-label{
    font-size:12px;
    color:var(--text-soft);
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-weight:600;
    margin-bottom:10px;
    display:block;
  }
  .template-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
  }
  .tpl-btn{
    background:var(--panel-2);
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:10px 4px;
    color:var(--text-soft);
    font-size:11.5px;
    font-weight:600;
    cursor:pointer;
    text-align:center;
    transition:all .15s ease;
    line-height:1.3;
  }
  .tpl-btn:hover{border-color:var(--accent);color:var(--ink);}
  .tpl-btn.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .upload-zone{
    border:1.5px dashed var(--line);
    border-radius:10px;
    padding:18px 14px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s ease;
    position:relative;
    background:var(--panel-2);
  }
  .upload-zone:hover{border-color:var(--accent);}
  .upload-zone input{
    position:absolute;inset:0;opacity:0;cursor:pointer;
  }
  .upload-zone .icon{font-size:22px;margin-bottom:6px;display:block;}
  .upload-zone .txt{font-size:12.5px;color:var(--text-soft);}
  .upload-zone .txt b{color:var(--ink);}
  label.field-label{
    font-size:12px;
    color:var(--text-soft);
    font-weight:500;
    display:block;
    margin-bottom:6px;
  }
  input[type=text], textarea{
    width:100%;
    background:var(--panel-2);
    border:1.5px solid var(--line);
    border-radius:8px;
    color:var(--ink);
    padding:10px 12px;
    font-family:inherit;
    font-size:13.5px;
    resize:none;
    margin-bottom:14px;
    transition:border-color .15s ease;
  }
  input[type=text]:focus, textarea:focus{
    outline:none;border-color:var(--accent);
  }
  textarea{min-height:64px;line-height:1.5;}
  .slider-row{
    display:flex;align-items:center;gap:10px;margin-bottom:14px;
  }
  .slider-row span{font-size:11.5px;color:var(--text-soft);width:34px;flex-shrink:0;}
  input[type=range]{
    flex:1;
    accent-color:var(--accent);
  }
  .swatches{display:flex;gap:8px;}
  .swatch{
    width:30px;height:30px;border-radius:50%;cursor:pointer;
    border:2.5px solid transparent;
    transition:transform .15s ease, border-color .15s ease;
    box-shadow:0 0 0 1px var(--line);
  }
  .swatch.active{border-color:var(--accent);transform:scale(1.12);}
  .hint{
    font-size:11.5px;color:var(--text-soft);line-height:1.5;
    background:var(--panel-2);
    border-radius:8px;
    padding:10px 12px;
    margin-top:4px;
  }
  .download-btn{
    width:100%;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:14px;
    font-family:inherit;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
    transition:filter .15s ease;
  }
  .download-btn:hover{filter:brightness(1.25);}
  .download-btn:active{filter:brightness(0.85);}

  /* CANVAS AREA */
  .canvas-area{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
  }
  .canvas-wrap{
    position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,0.12);
    border-radius:6px;
    overflow:hidden;
    background:#fff;
    border:1px solid var(--line);
  }
  canvas{
    display:block;
    width:315px;
    height:560px;
    cursor:grab;
    touch-action:none;
  }
  canvas.dragging{cursor:grabbing;}

  @media (max-width:820px){
    .app{flex-direction:column;}
    .sidebar{width:100%;}
    canvas{width:66vw;height:calc(66vw * 16 / 9);max-width:315px;max-height:560px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">Thumbnail Studio</div>
    <h1 class="brand-title">인스타 썸네일 메이커</h1>

    <div class="section">
      <span class="section-label">템플릿 스타일</span>
      <div class="template-grid" style="grid-template-columns:1fr 1fr;">
        <button class="tpl-btn active" data-tpl="bold">볼드<br>헤드라인</button>
        <button class="tpl-btn" data-tpl="quote">인용구<br>오버레이</button>
      </div>
    </div>

    <div class="section">
      <span class="section-label">사진</span>
      <div class="upload-zone">
        <input type="file" id="imgInput" accept="image/*">
        <span class="icon">📷</span>
        <span class="txt"><b>클릭해서 업로드</b><br>또는 드래그 / Ctrl+V 붙여넣기</span>
      </div>
      <div class="slider-row">
        <span>확대</span>
        <input type="range" id="zoomSlider" min="100" max="300" value="100">
      </div>
      <div class="hint">사진 위에서 드래그하면 위치를 옮길 수 있어요.</div>
    </div>

    <div class="section">
      <span class="section-label" id="titleLabel">타이틀</span>
      <textarea id="titleInput" maxlength="60">DONTAM</textarea>

      <span class="section-label" id="subLabel">카피</span>
      <input type="text" id="subInput" value="special day" maxlength="40">
    </div>

    <div class="section" id="titleStyleSection">
      <span class="section-label">타이틀 스타일</span>
      <div class="slider-row">
        <span>크기</span>
        <input type="range" id="titleSizeSlider" min="48" max="150" value="128">
      </div>
      <div class="slider-row">
        <span>위치</span>
        <input type="range" id="titleYSlider" min="320" max="1260" value="460">
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:14px;">
        <input type="checkbox" id="strokeToggle" style="accent-color:var(--accent);width:16px;height:16px;">
        타이틀 외곽선(스트록)
      </label>

      <span class="section-label">카피 스타일</span>
      <div class="slider-row">
        <span>크기</span>
        <input type="range" id="subSizeSlider" min="20" max="110" value="86">
      </div>
      <div class="template-grid" style="grid-template-columns:1fr 1fr;margin-bottom:14px;">
        <button class="tpl-btn subfont-btn active" data-subfont="script">필기체</button>
        <button class="tpl-btn subfont-btn" data-subfont="display">기본폰트</button>
      </div>

      <div class="hint">릴스가 피드에도 노출되는 걸 감안해 위·아래 320px는 안전 영역으로 비워뒀어요. 위치 슬라이더도 이 범위 안에서만 움직여요.</div>
    </div>

    <div class="section">
      <span class="section-label">포인트 컬러</span>
      <div class="swatches">
        <div class="swatch active" data-color="#C9A24B" style="background:#C9A24B"></div>
        <div class="swatch" data-color="#D96C5F" style="background:#D96C5F"></div>
        <div class="swatch" data-color="#5C7A63" style="background:#5C7A63"></div>
        <div class="swatch" data-color="#3E5C76" style="background:#3E5C76"></div>
        <div class="swatch" data-color="#8B5A8C" style="background:#8B5A8C"></div>
        <div class="swatch" data-color="#F5F1E8" style="background:#F5F1E8;border:1.5px solid #999"></div>
      </div>
    </div>

    <button class="download-btn" id="downloadBtn">PNG로 다운로드 (1080×1920, 릴스 비율)</button>
  </div>

  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="cv" width="1080" height="1920"></canvas>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 1080, H = 1920;

const state = {
  template: 'bold',
  accent: '#C9A24B',
  img: null,
  zoom: 1,
  offX: 0,
  offY: 0,
  titleSize: 128,
  titleY: 460,
  subSize: 86,
  subFont: 'script',
  strokeOn: false,
};

const els = {
  title: document.getElementById('titleInput'),
  sub: document.getElementById('subInput'),
  zoom: document.getElementById('zoomSlider'),
  titleSize: document.getElementById('titleSizeSlider'),
  titleY: document.getElementById('titleYSlider'),
  subSize: document.getElementById('subSizeSlider'),
  strokeToggle: document.getElementById('strokeToggle'),
};

function wrapText(text, maxWidth, fontStr){
  ctx.font = fontStr;
  const paragraphs = text.split('\n');
  const lines = [];
  paragraphs.forEach(p=>{
    const words = p.split(' ');
    let line = '';
    words.forEach(w=>{
      const test = line ? line + ' ' + w : w;
      if(ctx.measureText(test).width > maxWidth && line){
        lines.push(line);
        line = w;
      } else {
        line = test;
      }
    });
    lines.push(line);
  });
  return lines;
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawImageCover(dx,dy,dw,dh){
  if(!state.img){
    // placeholder
    const grad = ctx.createLinearGradient(dx,dy,dx+dw,dy+dh);
    grad.addColorStop(0,'#DDD8CC');
    grad.addColorStop(1,'#C7C1B3');
    ctx.fillStyle = grad;
    ctx.fillRect(dx,dy,dw,dh);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.font = "600 26px -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif";
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('사진을 업로드하세요', dx+dw/2, dy+dh/2);
    return;
  }
  const img = state.img;
  const baseScale = Math.max(dw/img.width, dh/img.height) * state.zoom;
  const drawW = img.width*baseScale;
  const drawH = img.height*baseScale;
  const maxOffX = Math.max(0,(drawW-dw)/2);
  const maxOffY = Math.max(0,(drawH-dh)/2);
  const offX = Math.min(maxOffX, Math.max(-maxOffX, state.offX));
  const offY = Math.min(maxOffY, Math.max(-maxOffY, state.offY));
  const x = dx + (dw-drawW)/2 + offX;
  const y = dy + (dh-drawH)/2 + offY;

  ctx.save();
  ctx.beginPath();
  ctx.rect(dx,dy,dw,dh);
  ctx.clip();
  ctx.drawImage(img, x, y, drawW, drawH);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const tpl = state.template;
  const accent = state.accent;
  const title = els.title.value || '';
  const sub = els.sub.value || '';

  if(tpl === 'bold'){
    drawImageCover(0,0,W,H);

    // title — heavy display caps, italic, size/position/stroke all adjustable
    const titleSize = state.titleSize;
    const subSize = state.subSize;
    const titleFont = `italic 900 ${titleSize}px 'Arial Black', Impact, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`;
    const titleLines = wrapText(title.toUpperCase(), W-120, titleFont);
    const titleLineHeight = Math.round(titleSize*1.06);

    const titleTop = state.titleY; // baseline of first line, top-anchored by default (safe-zone constrained by slider range)
    const lastTitleBaseline = titleTop + (titleLines.length-1)*titleLineHeight;
    const TITLE_COPY_GAP = 90; // fixed gap between title and copy, stays constant regardless of size sliders
    const subtitleY = lastTitleBaseline + TITLE_COPY_GAP;

    // soft scrim band behind the text block so it reads over any photo, regardless of stroke setting
    const scrimTop = titleTop - titleSize*0.95;
    const scrimBottom = subtitleY + subSize*0.9;
    const scrimPad = 90;
    const grad = ctx.createLinearGradient(0, Math.max(0,scrimTop-scrimPad), 0, Math.min(H,scrimBottom+scrimPad));
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(0.3,'rgba(0,0,0,0.28)');
    grad.addColorStop(0.7,'rgba(0,0,0,0.28)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, Math.max(0,scrimTop-scrimPad), W, (Math.min(H,scrimBottom+scrimPad))-(Math.max(0,scrimTop-scrimPad)));

    ctx.font = titleFont;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    let ty = titleTop;
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 4;
    titleLines.forEach(line=>{
      if(state.strokeOn){
        ctx.lineWidth = titleSize*0.14;
        ctx.strokeStyle = 'rgba(0,0,0,0.85)';
        ctx.strokeText(line, W/2, ty);
      }
      ctx.fillStyle = '#fff';
      ctx.fillText(line, W/2, ty);
      ty += titleLineHeight;
    });
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // subtitle — font choice: matching display font, or script/cursive
    const subFontStr = state.subFont === 'display'
      ? `italic 800 ${subSize}px 'Arial Black', Impact, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`
      : `italic 500 ${subSize}px 'Snell Roundhand', 'Lucida Handwriting', 'Segoe Script', 'Bradley Hand', cursive`;
    ctx.font = subFontStr;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#fff';
    ctx.fillText(sub, W/2, subtitleY);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

  } else if(tpl === 'quote'){
    drawImageCover(0,0,W,H);
    ctx.fillStyle = 'rgba(10,10,12,0.3)';
    ctx.fillRect(0,0,W,H);

    // decorative quote mark
    ctx.font = '800 160px Georgia, serif';
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.9;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('“', W/2, 480);
    ctx.globalAlpha = 1;

    const titleLines = wrapText(title, W-160, '700 100px Georgia, serif');
    ctx.font = '700 100px Georgia, serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 16;
    const totalH = titleLines.length*112;
    const titleStartY = H/2 - totalH/2 + 80;
    const quoteLineHeight = 112;
    titleLines.forEach((line,i)=>{
      ctx.fillText(line, W/2, titleStartY + i*quoteLineHeight);
    });
    const lastTitleBaseline = titleStartY + (titleLines.length-1)*quoteLineHeight;
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    const COPY_GAP = 90; // fixed gap between quote text and attribution
    const subtitleY = lastTitleBaseline + COPY_GAP;
    ctx.font = "600 46px -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif";
    ctx.fillStyle = accent;
    ctx.fillText(sub.toUpperCase(), W/2, subtitleY);
  }
}

// ---- events ----
document.querySelectorAll('.tpl-btn[data-tpl]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tpl-btn[data-tpl]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.template = btn.dataset.tpl;
    // update field labels contextually
    if(state.template === 'quote'){
      document.getElementById('titleLabel').textContent = '인용구 텍스트';
      document.getElementById('subLabel').textContent = '출처 / 작성자';
    } else {
      document.getElementById('titleLabel').textContent = '타이틀';
      document.getElementById('subLabel').textContent = '카피';
    }
    // title style sliders only apply to the bold headline template
    document.getElementById('titleStyleSection').style.display = (state.template === 'bold') ? 'block' : 'none';
    draw();
  });
});

document.querySelectorAll('.swatch').forEach(sw=>{
  sw.addEventListener('click', ()=>{
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    state.accent = sw.dataset.color;
    draw();
  });
});

[els.title, els.sub].forEach(el=>{
  el.addEventListener('input', draw);
});

els.titleSize.addEventListener('input', ()=>{
  state.titleSize = +els.titleSize.value;
  draw();
});
els.titleY.addEventListener('input', ()=>{
  state.titleY = +els.titleY.value;
  draw();
});
els.subSize.addEventListener('input', ()=>{
  state.subSize = +els.subSize.value;
  draw();
});
els.strokeToggle.addEventListener('change', ()=>{
  state.strokeOn = els.strokeToggle.checked;
  draw();
});

document.querySelectorAll('.subfont-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.subfont-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.subFont = btn.dataset.subfont;
    draw();
  });
});

els.zoom.addEventListener('input', ()=>{
  state.zoom = els.zoom.value/100;
  draw();
});

function loadImageFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      state.img = img;
      state.offX = 0;
      state.offY = 0;
      state.zoom = 1;
      els.zoom.value = 100;
      draw();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

const imgInput = document.getElementById('imgInput');
imgInput.addEventListener('change', (e)=>{
  loadImageFile(e.target.files[0]);
});

// paste a photo directly (Ctrl+V / Cmd+V) anywhere on the page
window.addEventListener('paste', (e)=>{
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return;
  for(const item of items){
    if(item.type && item.type.startsWith('image/')){
      const file = item.getAsFile();
      if(file){
        loadImageFile(file);
        e.preventDefault();
      }
      break;
    }
  }
});

// drag to reposition image
let dragging = false;
let lastX=0, lastY=0;
cv.addEventListener('pointerdown', (e)=>{
  if(!state.img) return;
  dragging = true;
  cv.classList.add('dragging');
  lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('pointermove', (e)=>{
  if(!dragging) return;
  const rect = cv.getBoundingClientRect();
  const scaleFactor = W/rect.width;
  const dx = (e.clientX-lastX)*scaleFactor;
  const dy = (e.clientY-lastY)*scaleFactor;
  state.offX += dx;
  state.offY += dy;
  lastX = e.clientX; lastY = e.clientY;
  draw();
});
window.addEventListener('pointerup', ()=>{
  dragging = false;
  cv.classList.remove('dragging');
});

document.getElementById('downloadBtn').addEventListener('click', ()=>{
  const link = document.createElement('a');
  link.download = 'instagram_thumbnail.png';
  link.href = cv.toDataURL('image/png');
  link.click();
});

// initial render after font loads
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(draw);
}
draw();
</script>
</body>
</html>
